<script>
    window.watermarkObjectUrls = {
        createFromStream: async function (streamReference, mimeType) {
            const bytes = await streamReference.arrayBuffer();
            const blob = new Blob([bytes], { type: mimeType || "application/octet-stream" });
            return (window.URL || window.webkitURL).createObjectURL(blob);
        },
        revoke: function (url) {
            if (url) (window.URL || window.webkitURL).revokeObjectURL(url);
        }
    };

    window.watermarkWorkspaceCanvas = (() => {
        const attached = new WeakMap();

        function attach(element) {
            if (!element || attached.has(element)) return;
            const state = {
                pointers: new Map(),
                scale: 1,
                x: 0,
                y: 0,
                startDistance: 0,
                startScale: 1,
                lastX: 0,
                lastY: 0
            };

            const image = () => element.querySelector("img");
            const apply = () => {
                const target = image();
                if (!target) return;
                const maxX = Math.max(0, element.clientWidth * (state.scale - 1) / 2);
                const maxY = Math.max(0, element.clientHeight * (state.scale - 1) / 2);
                state.x = Math.max(-maxX, Math.min(maxX, state.x));
                state.y = Math.max(-maxY, Math.min(maxY, state.y));
                target.style.transform = `translate3d(${state.x}px,${state.y}px,0) scale(${state.scale})`;
            };
            const distance = () => {
                const values = Array.from(state.pointers.values());
                if (values.length < 2) return 0;
                return Math.hypot(values[0].x - values[1].x, values[0].y - values[1].y);
            };

            const onPointerDown = event => {
                element.setPointerCapture?.(event.pointerId);
                state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
                if (state.pointers.size === 1) {
                    state.lastX = event.clientX;
                    state.lastY = event.clientY;
                } else if (state.pointers.size === 2) {
                    state.startDistance = distance();
                    state.startScale = state.scale;
                }
            };

            const onPointerMove = event => {
                if (!state.pointers.has(event.pointerId)) return;
                state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
                if (state.pointers.size >= 2 && state.startDistance > 0) {
                    state.scale = Math.max(1, Math.min(5, state.startScale * distance() / state.startDistance));
                    apply();
                    return;
                }
                if (state.scale > 1) {
                    state.x += event.clientX - state.lastX;
                    state.y += event.clientY - state.lastY;
                    state.lastX = event.clientX;
                    state.lastY = event.clientY;
                    apply();
                }
            };

            const release = event => {
                state.pointers.delete(event.pointerId);
                if (state.pointers.size < 2) state.startDistance = 0;
            };
            const onDoubleClick = () => {
                state.scale = 1;
                state.x = 0;
                state.y = 0;
                apply();
            };
            state.dispose = () => {
                element.removeEventListener("pointerdown", onPointerDown);
                element.removeEventListener("pointermove", onPointerMove);
                element.removeEventListener("pointerup", release);
                element.removeEventListener("pointercancel", release);
                element.removeEventListener("dblclick", onDoubleClick);
                state.pointers.clear();
            };
            element.addEventListener("pointerdown", onPointerDown, { passive: true });
            element.addEventListener("pointermove", onPointerMove, { passive: true });
            element.addEventListener("pointerup", release, { passive: true });
            element.addEventListener("pointercancel", release, { passive: true });
            element.addEventListener("dblclick", onDoubleClick);
            attached.set(element, state);
        }

        function detach(element) {
            const state = element ? attached.get(element) : null;
            if (!state) return;
            state.dispose?.();
            attached.delete(element);
        }

        return { attach, detach };
    })();

    window.watermarkTemplateVisibility = (() => {
        const scopes = new Map();

        function disconnect(scopeId) {
            const current = scopes.get(scopeId);
            if (!current) return;
            current.disconnect();
            scopes.delete(scopeId);
        }

        function observe(scopeId, selector, dotnet) {
            const root = document.getElementById(scopeId);
            if (!root || !dotnet || !("IntersectionObserver" in window)) return;
            disconnect(scopeId);
            const viewport = root.closest(".workspace-panel-content")
                || document.getElementById("wm-main-content")
                || null;
            const observer = new IntersectionObserver(entries => {
                for (const entry of entries) {
                    if (!entry.isIntersecting) continue;
                    observer.unobserve(entry.target);
                    const templateId = entry.target.dataset.templateId;
                    if (templateId) dotnet.invokeMethodAsync("EnsureVisibleTemplatePreviewAsync", templateId);
                }
            }, { root: viewport, rootMargin: "160px" });
            root.querySelectorAll(selector).forEach(element => observer.observe(element));
            scopes.set(scopeId, observer);
        }

        return { observe, disconnect };
    })();

    window.watermarkLegacyObjectUrls = (() => {
        const owners = new Map();
        const urlApi = () => window.URL || window.webkitURL;

        function release(ownerKey) {
            if (!ownerKey) return;
            const url = owners.get(ownerKey);
            if (!url) return;
            urlApi()?.revokeObjectURL(url);
            owners.delete(ownerKey);
        }

        function releasePrefix(prefix) {
            if (!prefix) return;
            for (const ownerKey of Array.from(owners.keys())) {
                if (ownerKey.startsWith(prefix)) release(ownerKey);
            }
        }

        function create(blob, ownerKey) {
            const api = urlApi();
            if (!api?.createObjectURL) throw new Error("当前 WebView 不支持 Blob URL");
            release(ownerKey);
            const url = api.createObjectURL(new Blob([blob], { type: "image/jpeg" }));
            if (ownerKey) owners.set(ownerKey, url);
            return url;
        }

        return { create, release, releasePrefix };
    })();

    function byteToUrl(blob, ownerKey) {
        return window.watermarkLegacyObjectUrls.create(blob, ownerKey);
    }

    function revokeUrl(url) {
        (window.URL || window.webkitURL || window || {}).revokeObjectURL(url);
    }

</script>
